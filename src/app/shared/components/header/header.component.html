<header class="header bg-light">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container-fluid p-0">
        <div class="logo me-4">
          <img src="assets/images/logo.png" alt="Logo">
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" [routerLink]="''" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Главная</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" [routerLink]="'/products'" routerLinkActive="active">Каталог</a>
            </li>
          </ul>
          <form class="d-flex">
            <input class="form-control input-search rounded-1" type="search" placeholder="Поиск чая" aria-label="Search" id="input-search" name="input-search">
            <button class="btn btn-search rounded-1" type="button">Найти</button>
          </form>
        </div>
      </div>
    </nav>
  </div>
</header>
